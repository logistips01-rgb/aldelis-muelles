<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aldelis — Lanzaderas</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    #chat-fab { position: fixed; bottom: 16px; right: 16px; z-index: 50; background: #1D9E75; color: #fff; border: none; border-radius: 24px; padding: 12px 20px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; box-shadow: 0 3px 10px rgba(0,0,0,0.2); cursor: pointer; }
    #chat-overlay { position: fixed; inset: 0; z-index: 60; background: #E4E7EB; display: flex; flex-direction: column; }
    .chatov-head { background: #1D9E75; color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
    .chatov-head .t { font-size: 16px; font-weight: 600; }
    .chatov-close { background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 16px; border-radius: 6px; padding: 4px 12px; cursor: pointer; }
    #chat-ov-msgs { flex: 1; overflow-y: auto; padding: 14px; background: #E4E7EB; }
    .chat-row { display: flex; margin-bottom: 8px; }
    .chat-row.r { justify-content: flex-end; }
    .chat-b { max-width: 78%; padding: 9px 13px; border-radius: 13px; font-size: 15px; line-height: 1.35; box-shadow: 0 1px 1px rgba(0,0,0,0.08); }
    .chat-b-in { background: #fff; color: #1A1A1A; }
    .chat-b-out { background: #1D9E75; color: #fff; }
    .chat-time { display: block; font-size: 10px; opacity: 0.7; margin-top: 3px; text-align: right; }
    .chat-emisor { display: block; font-size: 11px; font-weight: 600; opacity: 0.85; margin-bottom: 2px; }
    .chatov-quick { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 12px; }
    .chatov-chip { font-size: 14px; padding: 7px 14px; border-radius: 18px; border: 1.5px solid #1D9E75; background: #fff; color: #1D9E75; cursor: pointer; font-family: 'Inter', sans-serif; }
    .chatov-input { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #D1D5DB; background: #D8DCE1; }
    .chatov-input input { flex: 1; padding: 12px; border: 1px solid #B7BDC6; border-radius: 10px; font-size: 15px; font-family: 'Inter', sans-serif; background: #fff; }
    .chatov-input button { background: #1D9E75; color: #fff; border: none; border-radius: 10px; padding: 0 18px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }
  </style>
</head>
<body>
  <div style="width:100%; max-width:480px; margin:0 auto;">
    <div class="portal-header">
      <div class="logo">Aldelis</div>
      <div class="logo-sub">Registro de lanzadera</div>
    </div>
    <div id="app"></div>
  </div>

  <button id="chat-fab" style="display:none" onclick="abrirChat()">Chat con almacen</button>
  <div id="chat-overlay" style="display:none">
    <div class="chatov-head">
      <span class="t" id="chat-ov-titulo">Chat con Almacen</span>
      <button class="chatov-close" onclick="cerrarChat()">Cerrar</button>
    </div>
    <div id="chat-ov-msgs"></div>
    <div class="chatov-quick" id="chat-ov-quick"></div>
    <div class="chatov-input">
      <input type="text" id="chat-ov-text" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')enviarChatLanz()">
      <button onclick="enviarChatLanz()">Enviar</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
  <script src="js/firebase-config-compat.js"></script>
  <script src="js/push.js"></script>
  <script src="js/lanzadera.js"></script>
</body>
</html>
